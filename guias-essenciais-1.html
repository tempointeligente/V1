<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempo Inteligente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    height:100svh;
    background:radial-gradient(ellipse at 8% 4%, #B8E8D4 0%, transparent 42%),
                radial-gradient(ellipse at 92% 6%, #AEE2E6 0%, transparent 42%),
                radial-gradient(ellipse at 6% 96%, #B4E4C0 0%, transparent 45%),
                radial-gradient(ellipse at 94% 94%, #ACE1DC 0%, transparent 45%),
                radial-gradient(ellipse at 50% 50%, #FAFDFB 0%, #E3F3EB 80%),
                linear-gradient(135deg, #EFF8F3, #E4F2EA 50%, #E0F0EC 100%);
    font-family:system-ui,sans-serif;
    position:relative;
    overflow:hidden;
  }

  .bg-circuit{position:fixed;inset:0;z-index:0;overflow:hidden;}
  .circuit-cluster{position:absolute;height:auto;overflow:visible;}

  .flow-cyan{
    stroke:#57D1D6;stroke-width:1.3;fill:none;stroke-linecap:round;
    vector-effect:non-scaling-stroke;
    stroke-dasharray:90 950;
    animation:flow 4.5s linear infinite;
    filter:drop-shadow(0 0 5px rgba(87,209,214,.95)) drop-shadow(0 0 12px rgba(87,209,214,.6));
  }
  .flow-green{
    stroke:#42C48C;stroke-width:1.3;fill:none;stroke-linecap:round;
    vector-effect:non-scaling-stroke;
    stroke-dasharray:90 950;
    animation:flow 4.5s linear infinite;
    filter:drop-shadow(0 0 5px rgba(66,196,140,.95)) drop-shadow(0 0 12px rgba(66,196,140,.6));
  }
  .slow{animation-duration:6.5s;}
  .fast{animation-duration:3s;}
  .rev{animation-direction:reverse;}
  @keyframes flow{to{stroke-dashoffset:-1040;}}

  .node-pulse{animation:nodePulse 2.6s ease-in-out infinite;}
  @keyframes nodePulse{0%,100%{opacity:.35;r:3;}50%{opacity:1;r:5.5;}}

  @media (prefers-reduced-motion: reduce){
    .flow-cyan,.flow-green{animation:none;filter:none;}
    .node-pulse{animation:none;}
  }

  /* ===== Menu flutuante (usado em todas as páginas) ===== */
  .menu-float{
    position:fixed;top:3px;right:20px;z-index:40;
  }
  .menu-toggle{
    width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,.88);border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    flex-shrink:0;
    opacity:1;
    transition:opacity .25s ease, background .25s ease, box-shadow .25s ease;
  }
  .menu-toggle svg{width:22px;height:22px;}
  .menu-toggle svg circle, .menu-toggle svg line{stroke:#1B4332;}
  .menu-toggle svg circle{fill:#1B4332;}
  .menu-toggle:hover,
  .menu-toggle:focus-visible,
  .menu-toggle.active{
    opacity:1;
    background:#FFFFFF;
    box-shadow:0 4px 14px rgba(0,0,0,.15);
  }

  .menu-panel{
    position:fixed;top:0;right:0;height:100%;width:min(300px,82vw);
    background:#DFF0E4;border-left:1px solid rgba(27,67,50,.2);
    transform:translateX(100%);transition:transform .3s ease;
    display:flex;flex-direction:column;
    padding:36px 32px;z-index:60;
    overflow-y:auto;
  }
  .menu-panel.open{transform:translateX(0);}
  .menu-panel-logo{width:190px;height:auto;margin:8px 0 30px;display:block;}
  .menu-panel a{display:block;color:#1B4332;text-decoration:none;font-size:1.08rem;font-weight:600;padding:13px 0;border-bottom:1px solid rgba(27,67,50,.12);cursor:pointer;}
  .menu-panel a:hover{color:#2D9D6F;}
  .menu-more{border-bottom:1px solid rgba(27,67,50,.12);}
  .menu-more summary{
    display:flex;align-items:center;justify-content:space-between;
    color:#1B4332;font-size:1.08rem;font-weight:600;padding:13px 0;
    cursor:pointer;list-style:none;
  }
  .menu-more summary::-webkit-details-marker{display:none;}
  .menu-more summary::after{content:'+';font-size:1.3rem;color:#2D9D6F;transition:transform .2s ease;}
  .menu-more[open] summary::after{transform:rotate(45deg);}
  .menu-more .sub-links{padding:0 0 12px 12px;display:flex;flex-direction:column;}
  .menu-more .sub-links a{font-size:.96rem;font-weight:500;padding:9px 0;border-bottom:none;color:#3F4A46;}
  .menu-more .sub-links a:hover{color:#2D9D6F;}
  .close-btn{position:absolute;top:24px;right:28px;background:none;border:none;font-size:1.6rem;color:#1B4332;cursor:pointer;}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.15);opacity:0;pointer-events:none;transition:opacity .3s ease;z-index:50;}
  .overlay.open{opacity:1;pointer-events:auto;}

  /* ===== Toast "Em breve" ===== */
  .toast{
    position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);
    background:#1B4332;color:#fff;padding:12px 22px;border-radius:30px;
    font-size:.92rem;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);
    opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;
    z-index:80;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== Páginas (mostra/esconde) ===== */
  .page-section{display:none;position:relative;z-index:5;}
  .page-section.active{display:block;}

  /* ===== HOME ===== */
  .home-topbar{
    position:fixed;top:0;left:0;right:0;height:50px;z-index:20;
    display:flex;align-items:center;
    padding:0 24px;
    background:linear-gradient(90deg,#1B4332,#215B41);
    box-shadow:0 2px 10px rgba(27,67,50,.15);
  }
  .home-topbar span{
    color:#FFFFFF;font-size:.82rem;font-weight:600;letter-spacing:.3px;opacity:.92;
  }

  /* ===== Botões de navegação do fluxo (rodapé) ===== */
  .flow-nav{
    position:fixed;left:0;right:0;bottom:18px;z-index:15;
    display:flex;justify-content:space-between;
    padding:0 18px;pointer-events:none;
  }
  .flow-btn{
    pointer-events:auto;
    display:flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.75);border:none;cursor:pointer;
    padding:10px 18px;border-radius:30px;
    box-shadow:0 4px 14px rgba(0,0,0,.12);
    color:#1B4332;font-family:system-ui,sans-serif;font-size:.86rem;font-weight:700;
    transition:background .2s ease, box-shadow .2s ease, transform .15s ease;
  }
  .flow-btn:hover{background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.2);transform:translateY(-2px);}
  .flow-btn svg{width:16px;height:16px;flex-shrink:0;}
  .hero-center{
    min-height:100vh;
    padding-top:190px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
    position:relative;z-index:5;
  }
  .logo-wrap{display:block;width:100%;cursor:pointer;border:none;background:none;padding:0;position:relative;z-index:2;}
  .logo-wrap img{
    width:100%;height:auto;display:block;
    transition:transform .2s ease;
    animation:logoPulse 3.2s ease-in-out infinite;
  }
  .logo-wrap:hover img{transform:scale(1.02);animation-play-state:paused;}
  @keyframes logoPulse{
    0%,100%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(45,157,111,0));}
    50%{transform:scale(1.025);filter:drop-shadow(0 0 18px rgba(45,157,111,.28));}
  }
  @media (prefers-reduced-motion: reduce){
    .logo-wrap img{animation:none;}
  }

  /* ===== KeT — surge de trás da logo, ocupando o espaço acima ===== */
  .logo-stage{position:relative;width:min(560px,80vw);display:flex;justify-content:center;z-index:2;}
  .ket-wrap{
    position:absolute;left:50%;bottom:100%;margin-bottom:-10%;
    width:32%;z-index:1;pointer-events:none;
    opacity:0;transform:translateX(-50%) translateY(40px);
    animation:ketRise 1.2s cubic-bezier(.22,.9,.32,1) 1s forwards;
  }
  .ket-wrap img{width:100%;height:auto;display:block;filter:drop-shadow(0 12px 20px rgba(27,67,50,.18));}
  @keyframes ketRise{to{opacity:1;transform:translateX(-50%) translateY(0);}}
  @media (prefers-reduced-motion: reduce){
    .ket-wrap{animation:none;opacity:1;transform:translateX(-50%) translateY(0);}
  }
  @media (max-width:520px){
    .ket-wrap{width:38%;}
  }

  .promo-badge{
    display:flex;align-items:center;gap:10px;
    text-decoration:none;color:#1B4332;
    text-align:center;cursor:pointer;background:none;border:none;
  }
  .promo-badge .icon{width:26px;height:26px;flex-shrink:0;}
  .promo-badge .icon svg{width:100%;height:100%;display:block;}
  .promo-badge .txt{font-size:.86rem;font-weight:600;line-height:1.25;text-align:left;}
  .promo-badge .txt small{display:block;font-weight:500;color:#5A6B60;font-size:.74rem;}

  /* ===== Sobre Nós ===== */
  .sobre-page{
    padding:150px 24px 130px;max-width:720px;margin:0 auto;
  }
  .sobre-card{
    background:rgba(255,255,255,.62);
    border:1px solid rgba(255,255,255,.5);
    border-radius:20px;
    padding:34px 26px;
    box-shadow:0 10px 30px rgba(27,67,50,.10);
    backdrop-filter:blur(2px);
  }
  .sobre-title{
    font-family:'Space Grotesk',system-ui,sans-serif;
    font-size:clamp(1.7rem,5vw,2.3rem);font-weight:800;
    color:#16281E;margin-bottom:30px;text-align:center;
  }
  .sobre-page p{
    color:#243A30;font-size:1.06rem;line-height:1.75;margin-bottom:22px;
  }
  .sobre-page p:last-child{margin-bottom:0;}

  /* ===== Serviços / Plataformas (imagem com overlays) ===== */
  .services-page{
    padding:90px 20px 120px;
    max-width:650px;margin:0 auto;
    text-align:center;
  }
  .services-title{
    font-family:'Space Grotesk',system-ui,sans-serif;
    font-size:clamp(1.6rem,5vw,2.2rem);font-weight:800;
    color:#16281E;text-shadow:1px 1px 0 rgba(0,0,0,.08);
    margin-bottom:28px;
  }
  .services-page .img-wrap{position:relative;width:100%;}
  .services-page img{
    width:100%;height:auto;display:block;
  }
  .btn-hit{
    position:absolute;display:block;background:transparent;
    cursor:pointer;
  }
  .btn-hit:active{background:rgba(45,157,111,.18);border-radius:30px;}

  /* ===== Guias ===== */
  .page-content{
    padding:110px 24px 130px;
    max-width:1100px;margin:0 auto;
  }
  .intro-block{max-width:640px;margin:0 auto 64px;text-align:center;}
  .intro-logo{width:min(220px,50vw);height:auto;display:block;margin:0 auto 22px;}
  .intro-block p{color:#1B4332;font-size:1.28rem;line-height:1.55;font-weight:700;font-style:italic;}

  .guides-title{
    text-align:center;font-family:'Space Grotesk',system-ui,sans-serif;
    font-size:1.6rem;font-weight:700;color:#1B4332;margin-bottom:44px;
  }

  .guides-grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:46px 28px;
  }
  @media (max-width:820px){
    .guides-grid{grid-template-columns:1fr;max-width:380px;margin:0 auto;gap:56px;}
    .hero-center{padding-top:0;}
  }

  .guide-card{
    position:relative;
    background:linear-gradient(165deg,#EAF6EC,#D7ECDA);
    border:1px solid rgba(27,67,50,.22);
    border-radius:16px;
    padding:38px 22px 26px;
    box-shadow:0 10px 24px rgba(27,67,50,.08);
  }
  .guide-card .win-dots{
    position:absolute;top:10px;right:14px;
    font-family:'JetBrains Mono',monospace;font-size:.68rem;
    color:rgba(27,67,50,.4);letter-spacing:2px;
  }
  .guide-badge{
    position:absolute;top:-26px;left:50%;transform:translateX(-50%);
    width:54px;height:54px;border-radius:50%;
    background:#EAF6EC;border:3px solid #2D9D6F;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',system-ui,sans-serif;
    font-weight:700;font-size:1.35rem;color:#1B4332;
    box-shadow:0 4px 12px rgba(27,67,50,.18);
  }
  .guide-card p{
    margin-top:22px;color:#33413B;font-size:.92rem;line-height:1.55;
    min-height:96px;
  }
  .guide-card .acessar-btn{
    display:inline-block;margin-top:20px;padding:11px 30px;
    border-radius:30px;text-decoration:none;
    background:linear-gradient(180deg,#3FBF7F,#1F7A4E);
    color:#fff;font-weight:700;font-size:.88rem;
    box-shadow:0 4px 10px rgba(27,67,50,.28);
    transition:transform .15s ease;cursor:pointer;border:none;
  }
  .guide-card .acessar-btn:hover{transform:translateY(-2px);}

  /* ===== Contatos (placeholder) ===== */
  .contatos-page{
    min-height:70vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }
  .contatos-page h1{
    font-family:'Space Grotesk',system-ui,sans-serif;
    font-size:clamp(1.6rem,5vw,2.2rem);font-weight:800;color:#16281E;margin-bottom:14px;
  }
  .contatos-page p{color:#3F4A46;font-size:1.05rem;}

  /* ===== Guias Essenciais (página individual) ===== */
  .page-wrap{
    position:relative;z-index:5;
    height:100svh;box-sizing:border-box;
    display:flex;flex-direction:column;
    padding:62px 20px 16px;
    max-width:640px;margin:0 auto;
  }
  .back-link{
    display:flex;align-items:center;gap:6px;flex-shrink:0;
    color:#1B4332;text-decoration:none;font-size:.86rem;font-weight:700;
    margin-bottom:14px;
  }
  .back-link svg{width:16px;height:16px;}
  .page-title{
    flex-shrink:0;
    font-family:'Space Grotesk',system-ui,sans-serif;
    font-size:clamp(1.25rem,4.5vw,1.7rem);font-weight:800;color:#16281E;
    margin-bottom:14px;
  }
  .content-card{
    flex:1 1 auto;min-height:0;
    display:flex;flex-direction:column;
    background:linear-gradient(165deg,#EAF6EC,#D7ECDA);
    border:1px solid rgba(27,67,50,.22);
    border-radius:20px;
    padding:20px 20px 4px;
    box-shadow:0 10px 30px rgba(27,67,50,.10);
    overflow:hidden;
  }
  .text-scroll{
    flex:1;min-height:0;overflow-y:auto;
    color:#243A30;font-size:18px;line-height:1.6;
    padding-right:8px;padding-bottom:16px;
  }
  .text-scroll p{margin-bottom:14px;}
  .text-scroll p:last-child{margin-bottom:0;}
  .text-scroll::-webkit-scrollbar{width:6px;}
  .text-scroll::-webkit-scrollbar-thumb{background:rgba(27,67,50,.28);border-radius:10px;}

  .video-box{
    flex-shrink:0;margin-top:14px;height:min(30vh,220px);
    display:flex;justify-content:center;
  }
  .video-frame{
    width:min(30vh,220px);height:100%;aspect-ratio:1/1;
    border-radius:10px;overflow:hidden;
    background:#16281E;
    display:flex;align-items:center;justify-content:center;
  }
  .video-frame iframe{width:100%;height:100%;border:none;display:block;}
  .video-empty{
    text-align:center;color:#EAF6EC;padding:0 8px;
  }
  .video-empty b{display:block;font-size:.8rem;margin-bottom:3px;}
  .video-empty span{font-size:.68rem;opacity:.75;line-height:1.35;display:block;}
</style>
</head>

<script>
  // ---------- Carrega o conteudo do guia (texto + video + novidade) ----------
  (function(){
    const dados = (typeof GUIA1 !== 'undefined') ? GUIA1 : null;
    const textoEl = document.getElementById('textScroll');
    if(dados && dados.texto){
      textoEl.innerHTML = dados.texto.split('\n\n').map(p => `<p>${p}</p>`).join('');
    } else {
      textoEl.innerHTML = '<p>Conteúdo em preparação.</p>';
    }
    if(dados && dados.novidade){
      const badge = document.createElement('span');
      badge.textContent = 'Novidade';
      badge.style.cssText = 'display:inline-block;background:#2D9D6F;color:#fff;font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:12px;';
      textoEl.parentElement.insertBefore(badge, textoEl);
    }
    if(dados && dados.videoId){
      const frame = document.getElementById('videoFrame');
      frame.innerHTML = `<iframe src="https://www.youtube.com/embed/${dados.videoId}" title="Vídeo" allowfullscreen loading="lazy"></iframe>`;
    }
  })();

  const toggle = document.getElementById('menuToggle');
  const panel = document.getElementById('menuPanel');
  const overlay = document.getElementById('overlay');
  const closeBtn = document.getElementById('menuClose');
  function openMenu(){panel.classList.add('open');overlay.classList.add('open');}
  function closeMenu(){panel.classList.remove('open');overlay.classList.remove('open');}
  toggle.addEventListener('click', openMenu);
  if(closeBtn) closeBtn.addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);
</script>
